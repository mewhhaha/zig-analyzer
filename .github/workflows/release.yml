name: Release

on:
  push:
    tags: ["v[0-9]*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  ZIG_VERSION: 0.16.0
  ZIG_SHA256: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00

jobs:
  release:
    name: Build and publish x86_64 Linux archive
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Zig
        run: |
          archive_name="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          archive_path="${RUNNER_TEMP}/${archive_name}"
          curl --fail --location --silent --show-error \
            --output "${archive_path}" \
            "https://ziglang.org/download/${ZIG_VERSION}/${archive_name}"
          printf '%s  %s\n' "${ZIG_SHA256}" "${archive_path}" | sha256sum --check
          tar --extract --file "${archive_path}" --directory "${RUNNER_TEMP}"
          printf '%s\n' "${RUNNER_TEMP}/zig-x86_64-linux-${ZIG_VERSION}" >> "${GITHUB_PATH}"
      - name: Verify release tag
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          manifest_version="$(sed -n 's/^[[:space:]]*\.version = "\([^"]*\)",/\1/p' build.zig.zon)"
          if [ "${release_version}" != "${manifest_version}" ]; then
            printf 'tag version %s does not match build.zig.zon version %s\n' \
              "${release_version}" "${manifest_version}" >&2
            exit 1
          fi
      - name: Check formatting
        run: git ls-files -z '*.zig' '*.zon' | xargs -0 zig fmt --check
      - name: Run tests
        run: zig build test --summary all
      - name: Build release analyzer and compiler backend
        run: |
          zig build -Doptimize=ReleaseFast
          zig build backend
          release_version="${GITHUB_REF_NAME#v}"
          analyzer_version="$(zig-out/bin/zig-analyzer version | sed -n '1s/^zig-analyzer //p')"
          if [ "${analyzer_version}" != "${release_version}" ]; then
            printf 'built analyzer version %s does not match release version %s\n' \
              "${analyzer_version}" "${release_version}" >&2
            exit 1
          fi
      - name: Check analyzer sources
        run: zig-out/bin/zig-analyzer check --no-cache .
      - name: Assemble release archive
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          release_name="zig-analyzer-${release_version}-x86_64-linux"
          release_root="${RUNNER_TEMP}/${release_name}"
          install -D --mode=0755 zig-out/bin/zig-analyzer "${release_root}/bin/zig-analyzer"
          install -D --mode=0755 zig-out/backend/bin/zig "${release_root}/libexec/zig-analyzer/zig"
          install -D --mode=0644 zig-out/backend/zig-analyzer-backend.json \
            "${release_root}/libexec/zig-analyzer/zig-analyzer-backend.json"
          install -D --mode=0644 LICENSE "${release_root}/LICENSE"
          install -D --mode=0644 README.md "${release_root}/README.md"
          install -D --mode=0644 SECURITY.md "${release_root}/SECURITY.md"
          install -D --mode=0644 THIRD_PARTY_NOTICES.md "${release_root}/THIRD_PARTY_NOTICES.md"
          tar --create --xz --directory "${RUNNER_TEMP}" \
            --file "${release_name}.tar.xz" "${release_name}"
          sha256sum "${release_name}.tar.xz" > "${release_name}.tar.xz.sha256"
      - name: Exercise packaged installation
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          release_root="${RUNNER_TEMP}/zig-analyzer-${release_version}-x86_64-linux"
          temporary_workspace="$(mktemp -d)"
          cd "${temporary_workspace}"
          "${release_root}/bin/zig-analyzer" version
          "${release_root}/bin/zig-analyzer" doctor
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          release_name="zig-analyzer-${release_version}-x86_64-linux"
          gh release create "${GITHUB_REF_NAME}" \
            "${release_name}.tar.xz" \
            "${release_name}.tar.xz.sha256" \
            --generate-notes \
            --title "zig-analyzer ${release_version}" \
            --verify-tag
