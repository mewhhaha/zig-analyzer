name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0
      - name: Check formatting
        run: git ls-files -z '*.zig' '*.zon' | xargs -0 zig fmt --check
      - name: Run tests
        run: zig build test --summary all
      - name: Build analyzer
        run: zig build
      - name: Check analyzer sources
        run: zig-out/bin/zig-analyzer check --no-cache .
