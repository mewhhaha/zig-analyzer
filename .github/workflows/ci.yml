name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  ZIG_VERSION: 0.16.0
  ZIG_SHA256: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Zig
        run: |
          archive_name="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          archive_path="${RUNNER_TEMP}/${archive_name}"
          curl --fail --location --silent --show-error \
            --output "${archive_path}" \
            "https://ziglang.org/download/${ZIG_VERSION}/${archive_name}"
          printf '%s  %s\n' "${ZIG_SHA256}" "${archive_path}" | sha256sum --check
          tar --extract --file "${archive_path}" --directory "${RUNNER_TEMP}"
          printf '%s\n' "${RUNNER_TEMP}/zig-x86_64-linux-${ZIG_VERSION}" >> "${GITHUB_PATH}"
      - name: Check formatting
        run: git ls-files -z '*.zig' '*.zon' | xargs -0 zig fmt --check
      - name: Run tests
        run: zig build test --summary all
      - name: Run compiler-backed tests
        run: zig build backend-test --summary all
      - name: Build release analyzer
        run: zig build -Doptimize=ReleaseFast
      - name: Check analyzer sources
        run: zig-out/bin/zig-analyzer check --no-cache .
