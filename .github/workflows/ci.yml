name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  ZIG_VERSION: 0.16.0
  ZIG_SHA256: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Zig
        run: |
          archive="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          curl --fail --location --silent --show-error \
            --output "${archive}" \
            "https://ziglang.org/download/${ZIG_VERSION}/${archive}"
          printf '%s  %s\n' "${ZIG_SHA256}" "${archive}" | sha256sum --check
          tar --extract --file "${archive}"
          printf '%s\n' "${PWD}/zig-x86_64-linux-${ZIG_VERSION}" >> "${GITHUB_PATH}"
      - name: Check formatting
        run: git ls-files -z '*.zig' '*.zon' | xargs -0 zig fmt --check
      - name: Run tests
        run: zig build test --summary all
      - name: Build analyzer
        run: zig build
      - name: Check analyzer sources
        run: zig-out/bin/zig-analyzer check --no-cache .
